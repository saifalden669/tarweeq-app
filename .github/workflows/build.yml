name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'
          
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.5'
          
      - name: Install dependencies
        run: flutter pub get
        
      # خطوة سحرية لتجنب مشاكل الملفات المفقودة
      - name: Regenerate Android project structure
        run: |
          rm -rf android || true
          flutter create . --org com.example.tarweeqa
          
      - name: Build APK
        run: flutter build apk --release
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
